<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Mochila</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        .mochila {
            background-color: white;
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px;
            margin: 5px 0;
            background-color: #eaf2f8;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>🎒 Minha Mochila Escolar</h1>

    <div class="mochila">
        <h2>Materiais</h2>
        <ul>
            <li>📘 Caderno</li>
            <li>✏️ Lápis</li>
            <li>🖊️ Caneta</li>
            <li>📏 Régua</li>
            <li>📚 Livros</li>
            <li>🎨 Estojo</li>
        </ul>
    </div>

</body>
</html>
